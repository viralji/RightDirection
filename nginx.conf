server {
    listen 80;
    server_name rightdirection.com www.rightdirection.com;
    return 301 https://$host$request_uri;
}

# B2C + Student portal
server {
    listen 443 ssl http2;
    server_name app.rightdirection.com www.rightdirection.com;

    ssl_certificate /etc/letsencrypt/live/rightdirection.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rightdirection.com/privkey.pem;

    location /api/ {
        proxy_pass http://localhost:4005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /socket.io/ {
        proxy_pass http://localhost:4005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}

