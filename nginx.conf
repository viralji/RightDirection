# Agent white-label portals (wildcard subdomain)
# NOTE: requires a wildcard TLS cert (*.rightdirection.com) — the fullchain.pem below must cover it
server {
    listen 443 ssl http2;
    server_name *.rightdirection.com;

    ssl_certificate /etc/letsencrypt/live/rightdirection.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rightdirection.com/privkey.pem;

    location /api/ {
        proxy_pass http://localhost:4005;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://localhost:4005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}
