# RightDirection — isolated port 8090 (does not modify clickk.cloud or liveindus.com)
upstream rightdirection_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream rightdirection_api {
    server 127.0.0.1:4005;
    keepalive 32;
}

server {
    listen 8090;
    listen [::]:8090;
    server_name 139.59.87.174;

    access_log /var/log/nginx/rightdirection-access.log;
    error_log /var/log/nginx/rightdirection-error.log;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://rightdirection_api;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /socket.io/ {
        proxy_pass http://rightdirection_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location / {
        proxy_pass http://rightdirection_web;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
